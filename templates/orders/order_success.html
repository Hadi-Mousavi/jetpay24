<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سفارش ثبت شد — پی بریج</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root {
            --pb-primary: #0d6efd;
            --pb-gradient: linear-gradient(135deg, #0d6efd 0%, #6610f2 100%);
        }

        body {
            font-family: 'Vazirmatn', system-ui, sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .success-card {
            background: #fff;
            border-radius: 1.25rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            padding: 3rem 2rem;
            text-align: center;
            max-width: 560px;
            margin: auto;
        }

        .success-icon {
            width: 5rem;
            height: 5rem;
            border-radius: 50%;
            background: linear-gradient(135deg, #198754 0%, #20c997 100%);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 1.5rem;
        }

        .navbar-brand {
            font-weight: 800;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-light bg-white border-bottom">
        <div class="container">
            <a class="navbar-brand text-primary" href="/">
                <i class="bi bi-globe2 ms-1"></i>پی بریج
            </a>
        </div>
    </nav>

    <div class="container flex-grow-1 d-flex align-items-center py-5">
        <div class="success-card w-100">
            <div class="success-icon">
                <i class="bi bi-check-lg"></i>
            </div>
            <h1 class="fw-bold mb-3">سفارش شما با موفقیت ثبت شد</h1>
            <p class="text-muted mb-4">
                از اعتماد شما سپاسگزاریم. کارشناسان پی بریج در اسرع وقت
                جهت بررسی درخواست و هماهنگی مراحل پرداخت با شما تماس خواهند گرفت.
            </p>
            <div class="d-flex flex-wrap gap-3 justify-content-center">
                <a href="/" class="btn btn-primary btn-lg px-4">
                    <i class="bi bi-house-fill ms-1"></i>بازگشت به صفحه اصلی
                </a>
                <a href="{% url 'order_create' %}" class="btn btn-outline-primary btn-lg px-4">
                    <i class="bi bi-plus-circle ms-1"></i>ثبت سفارش جدید
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
